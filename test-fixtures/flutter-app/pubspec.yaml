name: flutter_test_app
description: Test Flutter app for stack-shared-ai

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.0
  go_router: ^12.0.0
  dio: ^5.3.0
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0
  shared_preferences: ^2.2.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.0
  get_it: ^7.6.0
  injectable: ^2.3.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  mockito: ^5.4.0

dependency_overrides:
  meta: ^1.10.0
  analyzer:
    git:
      url: https://github.com/dart-lang/sdk.git
      ref: main
      path: pkg/analyzer

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/logo.svg
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
